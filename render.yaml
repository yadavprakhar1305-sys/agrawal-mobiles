services:
  - type: web
    name: agrawal-mobiles
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd backend && npm install && node server.js
    healthCheckPath: /api/products
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrawal-mobiles-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"

databases:
  - name: agrawal-mobiles-db
    region: oregon
    plan: free
    databaseName: agrawal_mobiles
    ipAllowList: []
